services:
  db:
    image: postgres:15
    container_name: moveon_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: seva1234
      POSTGRES_DB: movedb
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./src/main/resources/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  server:
    build: .
    container_name: moveon_server
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: movedb
      DB_USER: postgres
      DB_PASSWORD: seva1234

volumes:
  db_data: